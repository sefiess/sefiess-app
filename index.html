<style>
:root{
  --primary:#1f3a5f;     /* azul marino */
  --primary-d:#152a46;
  --primary-dd:#0c1b30;
  --accent:#5b7fb0;      /* azul medio pastel */
  --dark:#16233a; --body:#3a4a63; --muted:#7286a3; --line:#d9e2ee;
  --bg:#eef2f8;          /* fondo pastel */
  --card:#ffffff;
  --soft:#dce7f3;        /* superficie azul pastel */
  --soft2:#eaf0f8;
  --green:#4a8a63; --green-bg:#dbeddf; --green-t:#2f5d40;
  --red:#b0524f; --red-bg:#f4dedd; --red-t:#7d3532;
  --amber:#a5813a; --amber-bg:#f2e7cf; --amber-t:#6e5522;
  --sup:#6d5ba0; --sup-bg:#e7e1f2; --sup-t:#463571;   /* supervisores */
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--body);overflow:hidden}
input,select,textarea,button{font-family:inherit;font-size:16px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#c3d2e6;border-radius:3px}
button{cursor:pointer}
#root{height:100%}
</style>
</head>
<body>
<div id="root"></div>
<script src="app.js?v=3"></script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
