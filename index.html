/* ─────────────────────────── SHA-256 ─────────────────────────── */
function sha256(ascii){
  function rightRotate(value, amount){return (value>>>amount)|(value<<(32-amount));}
  var mathPow=Math.pow, maxWord=mathPow(2,32), lengthProperty='length', i, j, result='';
  var words=[], asciiBitLength=ascii[lengthProperty]*8;
  var hash=sha256.h=sha256.h||[], k=sha256.k=sha256.k||[], primeCounter=k[lengthProperty];
  var isComposite={};
  for(var candidate=2;primeCounter<64;candidate++){
    if(!isComposite[candidate]){
      for(i=0;i<313;i+=candidate)isComposite[i]=candidate;
      hash[primeCounter]=(mathPow(candidate,.5)*maxWord)|0;
      k[primeCounter++]=(mathPow(candidate,1/3)*maxWord)|0;
    }
  }
  ascii+='\x80';
  while(ascii[lengthProperty]%64-56)ascii+='\x00';
  for(i=0;i<ascii[lengthProperty];i++){
    j=ascii.charCodeAt(i);
    if(j>>8)return;
    words[i>>2]|=j<<((3-i)%4)*8;
  }
  words[words[lengthProperty]]=((asciiBitLength/maxWord)|0);
  words[words[lengthProperty]]=(asciiBitLength);
  for(j=0;j<words[lengthProperty];){
    var w=words.slice(j,j+=16), oldHash=hash;
    hash=hash.slice(0,8);
    for(i=0;i<64;i++){
      var w15=w[i-15], w2=w[i-2];
      var a=hash[0], e=hash[4];
      var temp1=hash[7]
        +(rightRotate(e,6)^rightRotate(e,11)^rightRotate(e,25))
        +((e&hash[5])^((~e)&hash[6]))
        +k[i]
        +(w[i]=(i<16)?w[i]:(w[i-16]+(rightRotate(w15,7)^rightRotate(w15,18)^(w15>>>3))+w[i-7]+(rightRotate(w2,17)^rightRotate(w2,19)^(w2>>>10)))|0);
      var temp2=(rightRotate(a,2)^rightRotate(a,13)^rightRotate(a,22))+((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
      hash=[(temp1+temp2)|0].concat(hash);
      hash[4]=(hash[4]+temp1)|0;
    }
    for(i=0;i<8;i++)hash[i]=(hash[i]+oldHash[i])|0;
  }
  for(i=0;i<8;i++){
    for(j=3;j+1;j--){
      var b=(hash[i]>>(j*8))&255;
      result+=((b<16)?0:'')+b.toString(16);
    }
  }
  return result;
}

/* ═══════ Firebase: sincroniza la misma información entre todos los celulares ═══════

   NOTA DE DISEÑO: lo que crece sin límite con el tiempo (asistencia, rondas registradas,
   extras, infracciones) se guarda como UN DOCUMENTO POR REGISTRO en su propia colección,

function loadDB(){
  const base=seed();
  try{
    const s=localStorage.getItem(DB_KEY);
    if(s){ const saved=JSON.parse(s)||{}; return {...base, ...saved}; } // fusiona: conserva lo guardado y agrega claves nuevas
  }catch(e){}
  try{localStorage.setItem(DB_KEY,JSON.stringify(base));}catch(e){} return base;
}
const nucleoDeEstado=(d)=>{ const nx={...d}; LEGACY_KEYS.forEach(k=>delete nx[k]); return nx; };
function diffPorId(prevArr,nextArr){
  const prevMap=new Map((prevArr||[]).map(x=>[String(x.id),x]));
  const nextMap=new Map((nextArr||[]).map(x=>[String(x.id),x]));
  const upserts=[]; const borrados=[];
  for(const [id,item] of nextMap){ const antes=prevMap.get(id); if(!antes || JSON.stringify(antes)!==JSON.stringify(item)) upserts.push(item); }
  for(const id of prevMap.keys()){ if(!nextMap.has(id)) borrados.push(id); }
  return {upserts,borrados};
}
let _ultimoSync=(function(){ try{ const s=localStorage.getItem(DB_KEY); return s?JSON.parse(s):null; }catch(e){ return null; } })(); // última versión que ya se mandó a Firestore, para solo enviar lo que cambió
let _saveTimer=null;
function saveDB(d){
  try{localStorage.setItem(DB_KEY,JSON.stringify(d));}catch(e){}
  if(!fireCore) return;
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{
    const prev=_ultimoSync||{};
    fireCore.set(nucleoDeEstado(d)).catch((e)=>console.warn("No se pudo sincronizar el núcleo (sin señal, se reintenta solo).",e));
    LEGACY_KEYS.forEach(k=>{
      const col=fireCols[k]; if(!col) return;
      const {upserts,borrados}=diffPorId(prev[k], d[k]);
      upserts.forEach(item=>{ if(item && item.id!=null) col.doc(String(item.id)).set(item).catch(()=>{}); });
      borrados.forEach(id=>col.doc(id).delete().catch(()=>{}));
    });
    _ultimoSync=d;
  }, 500);
}

// Persona por rol (guardia/supervisor/administrativo por id; rrhh/operaciones son cuentas únicas)
function personaDe(db, role, id){
  if(role==='supervisor') return (db.supervisores||[]).find(x=>x.id===id);
  if(role==='administrativo') return (db.administrativos||[]).find(x=>x.id===id);
  if(role==='rrhh'){ const c=db.rrhh||{}; return {id:0,nombre:c.nombre||'RR.HH.',cuenta:c.usuario||'rrhh',horario:'',turno:'—',departamento:'—',unidadId:null}; }

  if(role==='admin'){ return {id:0,nombre:'Administración',cuenta:'admin',horario:'',turno:'—',departamento:'—',unidadId:null}; }
  return db.guardias.find(x=>x.id===id);
}

// ¿La entrada fue con atraso respecto al horario de la persona?
function esAtraso(reg, persona){
  if(!persona || reg.tipo!=='entrada') return false;
  const inicio=(persona.horario||"").split('-')[0].trim();
  if(!/^\d{1,2}:\d{2}$/.test(inicio)) return false;
  const d=new Date(reg.fechaISO);
  const [hh,mm]=inicio.split(':').map(Number);
  const prog=new Date(d); prog.setHours(hh,mm,0,0);
  return (d-prog)/60000 > 5;
}

// Ubicación actual -> {coords, maps}
function obtenerUbicacion(){
  return new Promise((resolve,reject)=>{
    if(!navigator.geolocation){ reject("Este dispositivo no soporta geolocalización."); return; }
    navigator.geolocation.getCurrentPosition(
      (pos)=>{
        const lat=pos.coords.latitude.toFixed(6), lng=pos.coords.longitude.toFixed(6);
        resolve({ coords:`${lat}, ${lng}`, maps:`https://maps.google.com/?q=${lat},${lng}` });
      },
      (err)=>{
        let m="No se pudo obtener la ubicación.";
        if(err.code===1) m="Permiso de ubicación denegado.";
        if(err.code===3) m="Tiempo de espera agotado al ubicar el GPS.";
        reject(m);
      },
      { enableHighAccuracy:true, timeout:15000, maximumAge:0 }
    );
  });
}

// Exportar a PDF (abre ventana de impresión -> Guardar como PDF / Imprimir)
function exportarPDF(titulo, columnas, filas){
  const w=window.open('', '_blank');
  if(!w){ alert("Permita las ventanas emergentes para exportar el PDF."); return; }
  const esc=(s)=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const thead=columnas.map(c=>`<th>${esc(c)}</th>`).join('');
  const rows=filas.length
    ? filas.map(f=>`<tr>${f.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('')
    : `<tr><td colspan="${columnas.length}" style="text-align:center;color:#888">Sin registros</td></tr>`;
  const fecha=new Date().toLocaleString('es-BO');
  w.document.write(`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>${esc(titulo)}</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;color:#16233a;padding:24px}
    h1{font-size:18px;color:#1f3a5f;margin:0 0 2px}
    .sub{font-size:12px;color:#7286a3;margin-bottom:16px}
    table{width:100%;border-collapse:collapse;font-size:12px}
    th{background:#1f3a5f;color:#fff;text-align:left;padding:8px 10px}
    td{padding:7px 10px;border-bottom:1px solid #d9e2ee}
    tr:nth-child(even) td{background:#f4f7fb}
    @media print{ @page{margin:14mm} }
  </style></head>
  <body onload="window.focus();window.print();">
    <h1>${esc(titulo)}</h1>
    <div class="sub">Generado: ${esc(fecha)} · Sefiess</div>
    <table><thead><tr>${thead}</tr></thead><tbody>${rows}</tbody></table>
  </body></html>`);
  w.document.close();
}

// Exportar a Excel (.xlsx con SheetJS; si no está disponible, descarga CSV que Excel abre)
function exportarExcel(nombre, columnas, filas){
  try{
    if(window.XLSX){
      const ws=XLSX.utils.aoa_to_sheet([columnas, ...filas]);
      const wb=XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Datos");
      XLSX.writeFile(wb, nombre+".xlsx");
      return;
    }
  }catch(e){}
  const esc=(s)=>{ s=String(s==null?'':s); return /[",;\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; };
  const csv=[columnas, ...filas].map(r=>r.map(esc).join(';')).join('\r\n');
  const blob=new Blob(["\ufeff"+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob), a=document.createElement('a');
  a.href=url; a.download=nombre+".csv"; document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ── Semanas (lunes a domingo). No se borra nada: solo se navega por semana. ──
function lunesDe(base){ const x=new Date(base); const dow=(x.getDay()+6)%7; x.setHours(0,0,0,0); x.setDate(x.getDate()-dow); return x; }
function semanaRango(offset){
  const ini=lunesDe(new Date()); ini.setDate(ini.getDate()+offset*7);
  const fin=new Date(ini); fin.setDate(fin.getDate()+6); fin.setHours(23,59,59,999);
  const f=(d)=>d.toLocaleDateString('es-BO',{day:'2-digit',month:'2-digit',year:'numeric'});
  return {ini, fin, label:`${f(ini)} al ${f(fin)}`, file:ini.toISOString().slice(0,10)};
}

function Login({db,onLogin}){
  const [usuario,setUsuario]=useState("");
  const [password,setPassword]=useState("");
  const [error,setError]=useState("");
  const [loading,setLoading]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{ if(ref.current) ref.current.focus(); },[]);

  const entrar=(e)=>{
    e.preventDefault();
    setError(""); setLoading(true);
    setTimeout(()=>{
      const u=usuario.trim().toLowerCase();
      const h=sha256(password);
      const adm=db.admins[u];
      if(adm && adm.passHash===h){ onLogin({role:"admin",usuario:u,nombre:adm.nombre}); return; }
      if(db.rrhh && u===db.rrhh.usuario && db.rrhh.passHash===h){ onLogin({role:"rrhh",usuario:u,nombre:db.rrhh.nombre,persId:0}); return; }
      if(db.operaciones && u===db.operaciones.usuario && db.operaciones.passHash===h){ onLogin({role:"operaciones",usuario:u,nombre:db.operaciones.nombre,persId:0}); return; }
      const a=(db.administrativos||[]).find(x=>x.cuenta.toLowerCase()===u);
      if(a && h===db.adminPersPassHash){
        if(a.estado!=="Activo"){ setError("Esta cuenta está inactiva. Contacte al administrador."); setLoading(false); return; }
        onLogin({role:"administrativo",usuario:u,nombre:a.nombre,persId:a.id}); return;
      }
      const g=db.guardias.find(x=>x.cuenta.toLowerCase()===u);
      if(g && h===db.guardPassHash){
        if(g.estado!=="Activo"){ setError("Esta cuenta está inactiva. Contacte al administrador."); setLoading(false); return; }
        onLogin({role:"guardia",usuario:u,nombre:g.nombre,persId:g.id}); return;
      }
      const s=(db.supervisores||[]).find(x=>x.cuenta.toLowerCase()===u);
      if(s && h===db.supPassHash){
        if(s.estado!=="Activo"){ setError("Esta cuenta está inactiva. Contacte al administrador."); setLoading(false); return; }
        onLogin({role:"supervisor",usuario:u,nombre:s.nombre,persId:s.id}); return;
      }
      setError("Usuario o contraseña incorrectos.");
      setLoading(false);
    },350);
  };

  return <div style={{height:'100%',overflowY:'auto',background:`linear-gradient(160deg,var(--primary) 0%,var(--primary-dd) 100%)`,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:20}}>
    <div style={{width:'100%',maxWidth:400}}>
      <div style={{textAlign:'center',marginBottom:24,color:'#fff'}}>
        <div style={{width:72,height:72,margin:'0 auto 14px',borderRadius:18,overflow:'hidden',boxShadow:'0 6px 20px rgba(0,0,0,.25)'}}>
          <img src="icons/icon-192.png?v=2" alt="Sefiess" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
        </div>
        <div style={{fontSize:12,letterSpacing:2,textTransform:'uppercase',opacity:.7,fontWeight:700}}>Sistema de</div>
        <div style={{fontSize:26,fontWeight:800,lineHeight:1.2,letterSpacing:1}}>SEFIESS</div>
        <div style={{fontSize:12.5,opacity:.65,marginTop:6}}>Control de asistencia y rondas</div>
      </div>
      <form onSubmit={entrar} style={{background:'#fff',borderRadius:18,padding:'24px 22px',boxShadow:'0 20px 50px rgba(0,0,0,.3)'}}>
        <Field label="Usuario">
          <input ref={ref} value={usuario} onChange={e=>setUsuario(e.target.value)} placeholder="admin · rrhh · operaciones · guardia0001 …"
            autoCapitalize="none" autoCorrect="off" style={inputStyle}/>
        </Field>
        <Field label="Contraseña">
          <PassInput value={password} onChange={e=>setPassword(e.target.value)}/>
        </Field>
        {error && <div style={{background:'var(--red-bg)',color:'var(--red-t)',fontSize:13,fontWeight:600,padding:'9px 12px',borderRadius:9,marginBottom:12}}>{error}</div>}
        <button type="submit" disabled={loading || !usuario || !password}
          style={{width:'100%',padding:'13px',background:loading?'#9db0c9':'var(--primary)',color:'#fff',border:'none',borderRadius:11,fontWeight:700,fontSize:15,marginTop:4}}>
          {loading?'Verificando…':'Ingresar'}
        </button>
        <div style={{marginTop:16,fontSize:11.5,color:'var(--muted)',textAlign:'center',lineHeight:1.6}}>
          El sistema lo dirige automáticamente a su panel<br/>según sus credenciales.
        </div>
      </form>
    </div>
  </div>;
}

/* ═══════════════════════════ SHELL MÓVIL (nav + cajón "Más") ═══════════════════════════ */
function Shell({title,subtitle,tabs,active,setActive,onLogout,children}){
  const [masOpen,setMasOpen]=useState(false);
  const MAXBAR=4;
  const primary = tabs.length<=5 ? tabs : tabs.slice(0,MAXBAR);
  const overflow = tabs.length<=5 ? [] : tabs.slice(MAXBAR);
  const activeInOverflow = overflow.some(t=>t.id===active);
  const go=(id)=>{ setActive(id); setMasOpen(false); };
  return <div style={{height:'100%',display:'flex',flexDirection:'column',background:'var(--bg)'}}>
    <div style={{background:'#fff',borderBottom:'1px solid var(--line)',padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>

        {subtitle && <div style={{fontSize:11.5,color:'var(--muted)',marginTop:1}}>{subtitle}</div>}
      </div>
      <button onClick={onLogout} style={{background:'var(--red-bg)',border:'none',borderRadius:10,padding:'8px 12px',color:'var(--red-t)',fontWeight:700,fontSize:12.5,display:'flex',alignItems:'center',gap:5}}>
        <Icon d={I.logout} size={16}/> Salir
      </button>
    </div>
    <div style={{flex:1,overflowY:'auto',padding:'16px 14px 90px'}}>{children}</div>

    {masOpen && <div onClick={()=>setMasOpen(false)} style={{position:'absolute',inset:0,background:'rgba(12,27,48,.5)',zIndex:60,display:'flex',alignItems:'flex-end'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#fff',width:'100%',borderRadius:'20px 20px 0 0',padding:'18px 16px calc(20px + env(safe-area-inset-bottom))'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <h3 style={{fontSize:17,fontWeight:800,color:'var(--dark)'}}>Más apartados</h3>
          <button onClick={()=>setMasOpen(false)} style={{background:'var(--soft2)',border:'none',borderRadius:10,padding:8,color:'var(--muted)'}}><Icon d={I.x}/></button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          {overflow.map(t=>{
            const on=active===t.id;
            return <button key={t.id} onClick={()=>go(t.id)}
              style={{background:on?'var(--soft)':'#f6f9fc',border:'1px solid '+(on?'var(--primary)':'var(--line)'),borderRadius:14,padding:14,textAlign:'left',display:'flex',alignItems:'center',gap:10}}>
              <Icon d={t.icon} size={20} color={on?'var(--primary)':'var(--body)'}/>
              <span style={{fontWeight:700,fontSize:14,color:on?'var(--primary)':'var(--dark)'}}>{t.label}</span>
            </button>;
          })}
        </div>
      </div>
    </div>}

    <div style={{position:'absolute',bottom:0,left:0,right:0,background:'#fff',borderTop:'1px solid var(--line)',display:'flex',justifyContent:'space-around',padding:'8px 4px calc(8px + env(safe-area-inset-bottom))',boxShadow:'0 -4px 16px rgba(0,0,0,.04)'}}>
      {primary.map(t=>{
        const on=active===t.id;
        return <button key={t.id} onClick={()=>go(t.id)}
          style={{background:'none',border:'none',display:'flex',flexDirection:'column',alignItems:'center',gap:3,flex:1,padding:'4px 2px',color:on?'var(--primary)':'var(--muted)'}}>
          <Icon d={t.icon} size={22} sw={on?2.2:1.9}/>
          <span style={{fontSize:10.5,fontWeight:on?700:600,textAlign:'center',lineHeight:1.1}}>{t.label}</span>
        </button>;
      })}
      {overflow.length>0 && <button onClick={()=>setMasOpen(true)}
        style={{background:'none',border:'none',display:'flex',flexDirection:'column',alignItems:'center',gap:3,flex:1,padding:'4px 2px',color:activeInOverflow?'var(--primary)':'var(--muted)'}}>
        <Icon d={I.grid} size={22} sw={activeInOverflow?2.2:1.9}/>
        <span style={{fontSize:10.5,fontWeight:activeInOverflow?700:600}}>Más</span>
      </button>}
    </div>
  </div>;
}

/* ═══════════════════════════ CÁMARA EN VIVO ═══════════════════════════ */
/* Abre la cámara del dispositivo. No permite subir archivos. La foto NO se
   guarda: solo sirve para confirmar la captura en vivo. Se registran hora + GPS. */
function CapturaEnVivo({label,color,onConfirm}){
  const [fase,setFase]=useState('idle');
  const [thumb,setThumb]=useState(null);
  const [ubic,setUbic]=useState(null);
  const [hora,setHora]=useState(null);
  const [msg,setMsg]=useState('');
  const [err,setErr]=useState('');
  const videoRef=useRef(null);
  const streamRef=useRef(null);

  const detener=()=>{ if(streamRef.current){ streamRef.current.getTracks().forEach(t=>t.stop()); streamRef.current=null; } };
  useEffect(()=>()=>detener(),[]);

  const abrir=async()=>{
    setErr('');
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      setErr("La cámara no está disponible en este navegador."); return;
    }
    try{
      const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
      streamRef.current=stream;
      setFase('camara');
      setTimeout(()=>{ if(videoRef.current){ videoRef.current.srcObject=stream; videoRef.current.play().catch(()=>{}); } },60);
    }catch(e){
      setErr("No se pudo abrir la cámara. Verifique los permisos y que la página esté en HTTPS.");
    }
  };

  const capturar=async()=>{
    const v=videoRef.current;
    try{
      const c=document.createElement('canvas');
      c.width=v.videoWidth||640; c.height=v.videoHeight||480;
      c.getContext('2d').drawImage(v,0,0,c.width,c.height);
      setThumb(c.toDataURL('image/jpeg',0.5));
    }catch(e){ setThumb(null); }
    detener();
    const nowISO=new Date().toISOString();
    setHora(nowISO); setFase('listo'); setUbic(null); setErr(''); setMsg('Obteniendo ubicación GPS…');
    try{ const u=await obtenerUbicacion(); setUbic(u); setMsg(''); }
    catch(e){ setErr(String(e)); setMsg(''); }
  };

  const reiniciar=()=>{ detener(); setFase('idle'); setThumb(null); setUbic(null); setHora(null); setMsg(''); setErr(''); };
  const confirmar=()=>{ onConfirm({ fechaISO:hora, coords:ubic?ubic.coords:null, maps:ubic?ubic.maps:null }); reiniciar(); };

  return <Card>
    {fase==='idle' && <div style={{textAlign:'center'}}>
      <div style={{width:96,height:96,margin:'6px auto 12px',borderRadius:'50%',border:`2px dashed ${color}`,display:'flex',alignItems:'center',justifyContent:'center',background:'var(--soft2)'}}>
        <Icon d={I.camera} size={40} color={color}/>
      </div>
      <div style={{fontWeight:700,color:'var(--dark)',fontSize:15}}>Verificación con foto en vivo</div>
      <div style={{fontSize:12.5,color:'var(--muted)',marginTop:2,marginBottom:14}}>Solo se abre la cámara. No se pueden subir archivos.</div>
      <button onClick={abrir}
        style={{width:'100%',padding:'13px',background:color,color:'#fff',border:'none',borderRadius:11,fontWeight:700,fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
        <Icon d={I.camera} size={19} color="#fff"/> {label}
      </button>
      {err && <div style={{background:'var(--amber-bg)',color:'var(--amber-t)',fontSize:12.5,fontWeight:600,padding:'9px 11px',borderRadius:9,marginTop:12,textAlign:'left'}}>⚠ {err}</div>}
    </div>}

    {fase==='camara' && <div style={{textAlign:'center'}}>
      <video ref={videoRef} playsInline muted style={{width:'100%',maxHeight:300,objectFit:'cover',borderRadius:12,background:'#000',marginBottom:12}}/>
      <div style={{display:'flex',gap:8}}>
        <button onClick={reiniciar} style={{flex:1,padding:'12px',background:'#f1f5f9',color:'var(--body)',border:'none',borderRadius:11,fontWeight:700,fontSize:14}}>Cancelar</button>
        <button onClick={capturar} style={{flex:2,padding:'12px',background:color,color:'#fff',border:'none',borderRadius:11,fontWeight:700,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:7}}>
          <Icon d={I.camera} size={18} color="#fff"/> Capturar foto
        </button>
      </div>
    </div>}

    {fase==='listo' && <div style={{textAlign:'center'}}>
      {thumb && <img src={thumb} alt="verificación" style={{width:'100%',maxHeight:220,objectFit:'cover',borderRadius:12,marginBottom:6}}/>}
      <div style={{fontSize:11,color:'var(--muted)',marginBottom:10}}>La foto es solo para verificar la captura en vivo y no se guarda.</div>
      <div style={{textAlign:'left',fontSize:13.5,lineHeight:1.9,marginBottom:8}}>
        <div style={{display:'flex',gap:8,alignItems:'center'}}><Icon d={I.clock} size={16} color="var(--primary)"/>
          <span><b>Hora:</b> {fmtHora(hora)} · {fmtFecha(hora)}</span></div>
        <div style={{display:'flex',gap:8,alignItems:'flex-start'}}><Icon d={I.pin} size={16} color="var(--primary)"/>
          <span><b>Ubicación:</b> {ubic?<>{ubic.coords} · <a href={ubic.maps} target="_blank" style={{color:'var(--primary)',fontWeight:700}}>abrir ubicación</a></>:<span style={{color:'var(--amber-t)'}}>sin GPS</span>}</span></div>
      </div>
      {msg && <div style={{fontSize:12.5,color:'var(--primary)',fontWeight:600,marginBottom:8}}>{msg}</div>}
      {err && <div style={{background:'var(--amber-bg)',color:'var(--amber-t)',fontSize:12,fontWeight:600,padding:'8px 10px',borderRadius:9,marginBottom:8,textAlign:'left'}}>⚠ {err} Se guardará el registro sin coordenadas.</div>}
      <div style={{display:'flex',gap:8}}>
        <button onClick={reiniciar} style={{flex:1,padding:'12px',background:'#f1f5f9',color:'var(--body)',border:'none',borderRadius:11,fontWeight:700,fontSize:14}}>Repetir</button>
        <button onClick={confirmar} disabled={!!msg}
          style={{flex:2,padding:'12px',background:msg?'#9db0c9':'var(--green)',color:'#fff',border:'none',borderRadius:11,fontWeight:700,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:7}}>
          <Icon d={I.check} size={18} color="#fff"/> Confirmar registro
        </button>
      </div>
    </div>}
  </Card>;
}

/* ═══════ Auto-registro de ingreso/salida (guardia o supervisor) ═══════ */
function AutoAsistencia({db,setDb,auth,persona}){
  const role=auth.role;
  const unidad=db.unidades.find(u=>u.id===persona.unidadId);
  const hoy=hoyISO();
  const regsHoy=db.asistencia.filter(a=>a.persRole===role && a.persId===persona.id && a.fechaISO.slice(0,10)===hoy);
  const entrada=regsHoy.find(a=>a.tipo==='entrada');
  const salida=regsHoy.find(a=>a.tipo==='salida');
  const [modo,setModo]=useState(null);

  const estadoEntrada=(()=>{
    if(!entrada) return null;
    if(esAtraso(entrada,persona)){ const d=new Date(entrada.fechaISO); const [hh,mm]=(persona.horario||'').split('-')[0].trim().split(':').map(Number);
      const prog=new Date(d); prog.setHours(hh,mm,0,0); return {tone:'red',txt:'Atrasado (+'+Math.round((d-prog)/60000)+' min)'}; }
    return {tone:'green',txt:'En hora'};
  })();

  const registrar=(tipo,data)=>{
    setDb(prev=>{
      const nx={...prev, asistencia:[...prev.asistencia, {id:uid(prev),persRole:role,persId:persona.id,tipo,...data}]};
      pushNotif(nx, auth, `${rolLabel(role)} ${persona.nombre} registró ${tipo}`);
      saveDB(nx); return nx;
    });
    setModo(null);
  };

  return <>
    <Card style={{background:'linear-gradient(135deg,var(--primary),var(--primary-d))',border:'none',color:'#fff'}}>
      <div style={{fontSize:12,opacity:.8,fontWeight:700,textTransform:'uppercase',letterSpacing:1}}>Asistencia del día</div>
      <div style={{fontSize:20,fontWeight:800,marginTop:2}}>{new Date().toLocaleDateString('es-BO',{weekday:'long',day:'numeric',month:'long'})}</div>
      <div style={{display:'flex',gap:16,marginTop:12,fontSize:13}}>
        <div><div style={{opacity:.75}}>Centro</div><div style={{fontWeight:700}}>{unidad?unidad.nombre:'—'}</div></div>
        <div><div style={{opacity:.75}}>Horario</div><div style={{fontWeight:700}}>{persona.horario}</div></div>
      </div>
    </Card>
    <Card>
      <div style={{fontWeight:800,color:'var(--dark)',marginBottom:12}}>Registros de hoy</div>
      <RegRow tipo="Entrada" reg={entrada} estado={estadoEntrada}/>
      <div style={{height:1,background:'var(--line)',margin:'10px 0'}}/>
      <RegRow tipo="Salida" reg={salida}/>
    </Card>
    {!entrada && !modo && <button onClick={()=>setModo('entrada')}
      style={{width:'100%',padding:'15px',background:'var(--primary)',color:'#fff',border:'none',borderRadius:12,fontWeight:700,fontSize:15,marginBottom:10,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
      <Icon d={I.check} size={20} color="#fff"/> Registrar entrada</button>}
    {entrada && !salida && !modo && <button onClick={()=>setModo('salida')}
      style={{width:'100%',padding:'15px',background:'var(--dark)',color:'#fff',border:'none',borderRadius:12,fontWeight:700,fontSize:15,marginBottom:10,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
      <Icon d={I.logout} size={19} color="#fff"/> Registrar salida</button>}
    {entrada && salida && <Card style={{textAlign:'center',background:'var(--green-bg)',border:'1px solid #c3ddc9'}}>
      <Icon d={I.check} size={30} color="var(--green)"/>
      <div style={{fontWeight:800,color:'var(--green-t)',marginTop:6}}>Jornada completa registrada</div>
    </Card>}
    {modo && <div style={{marginTop:4}}>
      <SectionTitle right={<button onClick={()=>setModo(null)} style={{background:'#f1f5f9',border:'none',borderRadius:9,padding:'6px 10px',fontSize:12,fontWeight:700,color:'var(--muted)'}}>Cancelar</button>}>
        Registro de {modo}
      </SectionTitle>
      <CapturaEnVivo label={modo==='entrada'?'Abrir cámara para entrada':'Abrir cámara para salida'} color={modo==='entrada'?'var(--primary)':'var(--dark)'}
        onConfirm={(data)=>registrar(modo,data)}/>
    </div>}
  </>;
}
function RegRow({tipo,reg,estado}){
  return <div style={{display:'flex',alignItems:'center',gap:12}}>
    <div style={{width:38,height:38,borderRadius:10,background:reg?'var(--green-bg)':'var(--soft2)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
      <Icon d={tipo==='Entrada'?I.clock:I.logout} size={19} color={reg?'var(--green)':'var(--muted)'}/>
    </div>
    <div style={{flex:1}}>
      <div style={{fontWeight:700,color:'var(--dark)',fontSize:14}}>{tipo}</div>
      {reg ? <div style={{fontSize:12,color:'var(--muted)'}}>{fmtHora(reg.fechaISO)}{reg.maps && <> · <a href={reg.maps} target="_blank" style={{color:'var(--primary)',fontWeight:700}}>ubicación</a></>}</div>
           : <div style={{fontSize:12,color:'var(--muted)'}}>Pendiente de registro</div>}
    </div>
    {estado && <Badge tone={estado.tone}>{estado.txt}</Badge>}
  </div>;
}

/* ═══════ Auto-registro de rondas (guardia o supervisor) ═══════ */
function AutoRonda({db,setDb,auth,persona}){
  const role=auth.role;
  const hoy=hoyISO();
  const plan=db.rondasPlan.filter(p=>p.persRole===role && p.persId===persona.id);
  const regsHoy=db.rondasReg.filter(r=>r.persRole===role && r.persId===persona.id && r.fechaISO.slice(0,10)===hoy);
  const [activo,setActivo]=useState(null);
  const [edit,setEdit]=useState(null);

  const registrar=(punto,data)=>{
    setDb(prev=>{
      const nx={...prev, rondasReg:[...prev.rondasReg, {id:uid(prev),persRole:role,persId:persona.id,punto,...data}]};
      pushNotif(nx, auth, `${rolLabel(role)} ${persona.nombre} pasó ronda: ${punto}`);
      saveDB(nx); return nx;
    });
    setActivo(null);
  };
  const guardarPunto=(p)=>{
    setDb(prev=>{
      let nx;
      if(p.id){ nx={...prev,rondasPlan:prev.rondasPlan.map(x=>x.id===p.id?{...x,...p}:x)}; }
      else { nx={...prev,rondasPlan:[...prev.rondasPlan,{...p,id:uid(prev),persRole:role,persId:persona.id,unidadId:persona.unidadId}]}; }
      saveDB(nx); return nx;
    });
    setEdit(null);
  };
  const borrarPunto=(id)=>{ if(!confirm("¿Eliminar este punto?"))return;
    setDb(prev=>{const nx={...prev,rondasPlan:prev.rondasPlan.filter(p=>p.id!==id)};saveDB(nx);return nx;}); };

  return <>
    <SectionTitle right={<button onClick={()=>setEdit('nuevo')} style={{background:'var(--primary)',color:'#fff',border:'none',borderRadius:10,padding:'8px 12px',fontWeight:700,fontSize:13,display:'flex',alignItems:'center',gap:5}}><Icon d={I.plus} size={16} color="#fff"/> Punto</button>}>Mi ronda de control</SectionTitle>
    <div style={{fontSize:12,color:'var(--muted)',margin:'-6px 2px 12px'}}>Puede añadir o modificar los puntos según su centro de trabajo.</div>
    {plan.length===0 && <Empty>No tiene puntos de ronda. Añada uno con el botón «Punto».</Empty>}
    {plan.map(p=>{
      const reg=regsHoy.find(r=>r.punto===p.punto);
      return <Card key={p.id}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:40,height:40,borderRadius:11,background:reg?'var(--green-bg)':'var(--soft)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <Icon d={I.route} size={20} color={reg?'var(--green)':'var(--primary)'}/>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,color:'var(--dark)'}}>{p.punto}</div>
            <div style={{fontSize:12.5,color:'var(--muted)'}}>Programado: {p.hora}</div>
          </div>
          {reg ? <Badge tone="green">Hecho {fmtHora(reg.fechaISO)}</Badge> : <Badge tone="amber">Pendiente</Badge>}
        </div>
        {reg && reg.maps && <div style={{marginTop:8,fontSize:12}}><a href={reg.maps} target="_blank" style={{color:'var(--primary)',fontWeight:700}}>abrir ubicación</a></div>}
        <div style={{display:'flex',gap:8,marginTop:12}}>
          {!reg && activo!==p.id && <button onClick={()=>setActivo(p.id)}
            style={{flex:1,padding:'10px',background:'var(--primary)',color:'#fff',border:'none',borderRadius:10,fontWeight:700,fontSize:13.5,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
            <Icon d={I.camera} size={16} color="#fff"/> Pasar ronda</button>}
          <button onClick={()=>setEdit(p)} style={{...btnGhost,flex:'0 0 44px'}}><Icon d={I.edit} size={16}/></button>
          <button onClick={()=>borrarPunto(p.id)} style={{...btnGhost,flex:'0 0 44px',color:'var(--red)'}}><Icon d={I.trash} size={16}/></button>
        </div>
        {activo===p.id && <div style={{marginTop:12}}>
          <CapturaEnVivo label="Abrir cámara del punto" color="var(--primary)" onConfirm={(data)=>registrar(p.punto,data)}/>
          <button onClick={()=>setActivo(null)} style={{width:'100%',padding:'9px',background:'none',border:'none',color:'var(--muted)',fontWeight:600,fontSize:13}}>Cancelar</button>
        </div>}
      </Card>;
    })}
    {edit && <PuntoRondaForm punto={edit==='nuevo'?null:edit} onSave={guardarPunto} onClose={()=>setEdit(null)}/>}
  </>;
}
function PuntoRondaForm({punto,onSave,onClose}){
  const [f,setF]=useState(punto||{punto:"",hora:"08:00"});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  return <Modal title={punto?"Editar punto":"Nuevo punto de ronda"} onClose={onClose}>
    <Field label="Punto a supervisar *"><input style={inputStyle} value={f.punto} onChange={e=>set('punto',e.target.value)} placeholder="Ej: Puerta principal"/></Field>
    <Field label="Hora programada"><input type="time" style={inputStyle} value={f.hora} onChange={e=>set('hora',e.target.value)}/></Field>
    <button onClick={()=>{ if(!f.punto.trim()){alert("Ingrese el nombre del punto");return;} onSave(f); }} style={{width:'100%',padding:'13px',background:'var(--primary)',color:'#fff',border:'none',borderRadius:11,fontWeight:700,fontSize:15,marginTop:4}}>Guardar</button>
  </Modal>;
}

/* ═══════════ Helpers de persona (ficha, domicilio en Maps) ═══════════ */
function domicilioMaps(p){
  if(p.direccionMaps && p.direccionMaps.trim()) return p.direccionMaps.trim();
  if(p.direccion && p.direccion.trim()) return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.direccion.trim())}`;
  return null;
}

function FichaPersona({p,unidad,kind}){
  const dm=domicilioMaps(p);
  const rows=[
    ["Cuenta (usuario)",p.cuenta],["Nombre completo",p.nombre],["Cédula de Identidad",p.ci],
    ["Teléfono principal",p.tel1],["Teléfono de respaldo 1",p.tel2||"—"],["Teléfono de respaldo 2",p.tel3||"—"],
    ["Correo",p.correo],["Departamento",p.departamento||"—"],["Centro / Unidad",unidad?unidad.nombre:"—"],

      <div style={{flex:1,color:'var(--dark)',fontWeight:600}}>
        {p.direccion||"—"}{dm && <> · <a href={dm} target="_blank" style={{color:'var(--primary)',fontWeight:700}}>ver en Maps</a></>}
      </div>
    </div>
    {rows.map(([k,v],i)=><div key={i} style={{display:'flex',padding:'9px 0',borderBottom:'1px solid var(--line)',fontSize:14}}>
      <div style={{width:'42%',color:'var(--muted)',fontWeight:600,fontSize:12.5}}>{k}</div>
      <div style={{flex:1,color:'var(--dark)',fontWeight:600}}>{v}</div>
    </div>)}
    <div style={{display:'flex',padding:'9px 0',fontSize:14,alignItems:'center'}}>
      <div style={{width:'42%',color:'var(--muted)',fontWeight:600,fontSize:12.5}}>Estado</div>
      <div><Badge tone={p.estado==='Activo'?'green':'red'}>{p.estado}</Badge></div>
    </div>
    {dm && <a href={dm} target="_blank" style={{display:'flex',marginTop:12,textDecoration:'none',padding:'11px',background:'var(--soft)',color:'var(--primary)',borderRadius:10,fontWeight:700,fontSize:14,alignItems:'center',justifyContent:'center',gap:6}}>
      <Icon d={I.pin} size={17} color="var(--primary)"/> Abrir ubicación del domicilio</a>}
  </div>;
}

      <div>
        <div style={{fontSize:11.5,color:'var(--muted)',fontWeight:600}}>Cuenta asignada (usuario de acceso)</div>
        <div style={{fontSize:16,fontWeight:800,color:'var(--primary)'}}>{cuentaPreview}</div>
      </div>

/* Lista/gestión de personas (guardias o supervisores). readOnly oculta acciones de edición */
function ListaPersonas({db,setDb,auth,kind,titulo}){
  const [edit,setEdit]=useState(null);
  const [ver,setVer]=useState(null);
  const [q,setQ]=useState("");
  const [turno,setTurno]=useState("todos");
  const arrKey = kind==='supervisor'?'supervisores':kind==='administrativo'?'administrativos':'guardias';
  const artic = kind==='supervisor'?'al supervisor':kind==='administrativo'?'al administrativo':'al guardia';
  const lista=(db[arrKey]||[]).filter(g=>{
    const t=(g.nombre+' '+g.ci+' '+g.cuenta).toLowerCase();
    return t.includes(q.toLowerCase()) && (turno==='todos'||g.turno===turno);
  });
  const nextFn = kind==='supervisor'? nextSuperv : kind==='administrativo'? nextAdmin : nextGuardia;
  const maxN = kind==='supervisor'? MAX_SUPERV : kind==='administrativo'? MAX_ADMIN : MAX_GUARDIAS;

  const guardar=(datos)=>{
    setDb(prev=>{
      let nx, msg;
      if(datos.id){ nx={...prev, [arrKey]:prev[arrKey].map(g=>g.id===datos.id?{...g,...datos}:g)}; msg=`editó ${artic} ${datos.nombre}`; }
      else {
        const cuenta=nextFn(prev[arrKey]||[]);
        if(!cuenta){ alert("No hay cuentas disponibles (máximo "+maxN+")."); return prev; }
        const id=uid(prev);
        nx={...prev, [arrKey]:[...(prev[arrKey]||[]),{...datos,id,cuenta}]}; msg=`registró ${artic} ${datos.nombre} (${cuenta})`;
      }
      pushNotif(nx, auth, msg); saveDB(nx); return nx;
    });
    setEdit(null);
  };
  // Borrado en cascada
  const borrar=(p)=>{
    if(!confirm("Al eliminar esta cuenta se borrará TODA su información (asistencia, rondas, extras e infracciones) y su cuenta quedará libre. ¿Continuar?"))return;
    setDb(prev=>{
      const nx={...prev,
        [arrKey]:prev[arrKey].filter(g=>g.id!==p.id),
        asistencia:prev.asistencia.filter(a=>!(a.persRole===(kind)&&a.persId===p.id)),
        rondasReg:prev.rondasReg.filter(r=>!(r.persRole===(kind)&&r.persId===p.id)),
        rondasPlan:prev.rondasPlan.filter(r=>!(r.persRole===(kind)&&r.persId===p.id)),
        extras:(prev.extras||[]).filter(x=>!(x.ambito===kind && (x.trabajadorId===p.id||x.reemplazaId===p.id))),
        infracciones: (kind==='guardia'||kind==='administrativo') ? (prev.infracciones||[]).filter(x=>!(x.destRole===kind && x.destId===p.id)) : (prev.infracciones||[]),
      };
      pushNotif(nx, auth, `eliminó la cuenta ${p.cuenta} (${p.nombre}) y todos sus datos`);
      saveDB(nx); return nx;
    });
    setVer(null);
  };

  return <>
    <SectionTitle right={<button onClick={()=>setEdit('nuevo')} style={{background:'var(--primary)',color:'#fff',border:'none',borderRadius:10,padding:'8px 12px',fontWeight:700,fontSize:13,display:'flex',alignItems:'center',gap:5}}><Icon d={I.plus} size={16} color="#fff"/> Nuevo</button>}>{titulo}</SectionTitle>
    <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar por nombre, CI o cuenta…" style={{...inputStyle,marginBottom:10}}/>
    <ChipGroup label="Turno" sel={turno==='todos'?[]:[turno]} setSel={(arr)=>setTurno(arr.length? arr[arr.length-1] : 'todos')}
      opciones={[{v:'Diurno',t:'Diurno'},{v:'Nocturno',t:'Nocturno'}]}/>
    {lista.length===0 && <Empty>Sin resultados.</Empty>}
    {lista.map(g=><Card key={g.id} style={{padding:14}}>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <div style={{width:44,height:44,borderRadius:'50%',background:kind==='supervisor'?'var(--sup-bg)':'var(--soft)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Icon d={kind==='supervisor'?I.shield:kind==='administrativo'?I.id:I.user} size={22} color={kind==='supervisor'?'var(--sup)':'var(--primary)'}/></div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,color:'var(--dark)'}}>{g.nombre}</div>
          <div style={{fontSize:12,color:'var(--muted)'}}>{g.cuenta} · {g.turno} · {g.departamento}</div>
        </div>
        <Badge tone={g.estado==='Activo'?'green':'red'}>{g.estado}</Badge>
      </div>
      <div style={{display:'flex',gap:8,marginTop:12}}>
        <button onClick={()=>setVer(g)} style={btnGhost}>Ver ficha</button>
        {domicilioMaps(g) && <a href={domicilioMaps(g)} target="_blank" style={{...btnGhost,textDecoration:'none',color:'var(--primary)',flex:'0 0 auto',padding:'9px 12px'}}><Icon d={I.pin} size={15} color="var(--primary)"/> Ubicación</a>}
        <button onClick={()=>setEdit(g)} style={btnGhost}><Icon d={I.edit} size={15}/> Editar</button>
      </div>
    </Card>)}

    {ver && <Modal title={ver.nombre} onClose={()=>setVer(null)}>
      <FichaPersona p={ver} unidad={db.unidades.find(u=>u.id===ver.unidadId)} kind={kind}/>
      <button onClick={()=>borrar(ver)} style={{width:'100%',marginTop:8,padding:'11px',background:'var(--red-bg)',color:'var(--red-t)',border:'none',borderRadius:10,fontWeight:700,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}><Icon d={I.trash} size={16}/> Eliminar cuenta y todos sus datos</button>
    </Modal>}
    {edit && <PersonaForm db={db} kind={kind} persona={edit==='nuevo'?null:edit} onSave={guardar} onClose={()=>setEdit(null)}/>}
  </>;
}

/* ═══════════ Planilla de ASISTENCIA (multi-filtro + color por rol) ═══════════ */
function AdminAsistencia({db,viewer}){
  const [semOff,setSemOff]=useState(0);
  const [rol,setRol]=useState([]); const [turno,setTurno]=useState([]);
  const [evento,setEvento]=useState([]); const [depto,setDepto]=useState([]); const [centro,setCentro]=useState([]);
  const pers=(r)=>personaDe(db,r.persRole,r.persId);
  const centroNom=(id)=>{const u=db.unidades.find(x=>x.id===id);return u?u.nombre:'—';};
  // Visibilidad por rol: el admin ve la asistencia de todos (incl. RR.HH./Operaciones);
  // RR.HH. ve guardias, supervisores y administrativos; los demás solo guardias y supervisores.
  const visibles = viewer==='admin' ? ['guardia','supervisor','administrativo','rrhh','operaciones','admin']
    : viewer==='rrhh' ? ['guardia','supervisor','administrativo']
    : ['guardia','supervisor'];
  const rolTxt = {guardia:'Guardias',supervisor:'Supervisores',administrativo:'Administrativos',rrhh:'RR.HH.',operaciones:'Operaciones',admin:'Administración'};
  const rolChips = visibles.map(r=>({v:r,t:rolTxt[r]}));
  const sem=semanaRango(semOff);

  const regs=db.asistencia.filter(a=>{const t=new Date(a.fechaISO); return t>=sem.ini && t<=sem.fin && visibles.includes(a.persRole);}).map(a=>({a,p:pers(a)})).filter(({a,p})=>{
    if(!p) return false;
    if(rol.length && !rol.includes(a.persRole)) return false;
    if(turno.length && !turno.includes(p.turno)) return false;
    if(depto.length && !depto.includes(p.departamento)) return false;
    if(centro.length && !centro.includes(String(p.unidadId))) return false;
    if(evento.length){
      const ok = (evento.includes('entrada')&&a.tipo==='entrada')
              || (evento.includes('salida')&&a.tipo==='salida')
              || (evento.includes('atraso')&&esAtraso(a,p));
      if(!ok) return false;
    }
    return true;
  }).sort((x,y)=>new Date(x.a.fechaISO)-new Date(y.a.fechaISO));

  const cols=["Fecha","Persona","Rol","Turno","Depto.","Centro","Evento","Hora","Coordenadas"];
  const filas=()=>regs.map(({a,p})=>[fmtFecha(a.fechaISO), p.nombre, rolLabel(a.persRole), p.turno||'—', p.departamento||'—', centroNom(p.unidadId),
        a.tipo==='entrada'?(esAtraso(a,p)?'entrada (atraso)':'entrada'):'salida', fmtHora(a.fechaISO), a.coords||'sin GPS']);
  const exportar=()=>exportarPDF(`Asistencia · Semana ${sem.label}`, cols, filas());
  const exportarXls=()=>exportarExcel(`asistencia_semana_${sem.file}`, cols, filas());
  return <>
    <SectionTitle right={puedeExportar(viewer) && <div style={{display:'flex',gap:6}}>
      <button onClick={exportarXls} style={{background:'var(--green-bg)',color:'var(--green-t)',border:'1px solid #c3ddc9',borderRadius:10,padding:'8px 10px',fontWeight:700,fontSize:13,display:'flex',alignItems:'center',gap:4}}><Icon d={I.dl} size={16} color="var(--green-t)"/> Excel</button>
      <button onClick={exportar} style={{background:'var(--soft)',color:'var(--primary)',border:'1px solid var(--line)',borderRadius:10,padding:'8px 10px',fontWeight:700,fontSize:13,display:'flex',alignItems:'center',gap:4}}><Icon d={I.pdf} size={16} color="var(--primary)"/> PDF</button>
    </div>}>Asistencia</SectionTitle>
    <SemanaNavFiltros sem={sem} semOff={semOff} setSemOff={setSemOff}>
      <ChipGroup label="Rol" sel={rol} setSel={setRol} opciones={rolChips}/>
      <ChipGroup label="Turno" sel={turno} setSel={setTurno} opciones={[{v:'Diurno',t:'Diurno'},{v:'Nocturno',t:'Nocturno'}]}/>
      <ChipGroup label="Evento" sel={evento} setSel={setEvento} opciones={[{v:'entrada',t:'Entrada'},{v:'salida',t:'Salida'},{v:'atraso',t:'Atraso'}]}/>
      <ChipGroup label="Departamento" sel={depto} setSel={setDepto} opciones={DEPARTAMENTOS.map(d=>({v:d,t:d}))}/>
      <ChipGroup label="Centro" sel={centro} setSel={setCentro} opciones={db.unidades.map(u=>({v:String(u.id),t:u.nombre}))}/>
    </SemanaNavFiltros>
    {regs.length===0 && <Empty>Sin registros para este filtro.</Empty>}
    {regs.map(({a,p})=>{
      const sup=a.persRole==='supervisor';
      const otro=a.persRole!=='guardia' && !sup; // administrativo / rrhh / operaciones
      const barra = sup?'var(--sup)':(otro?'var(--accent)':'var(--primary)');
      const atras=esAtraso(a,p);
      return <Card key={a.id} style={{padding:14,borderLeft:`4px solid ${barra}`}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:38,height:38,borderRadius:10,background:sup?'var(--sup-bg)':(a.tipo==='entrada'?'var(--green-bg)':'var(--soft2)'),display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <Icon d={a.tipo==='entrada'?I.clock:I.logout} size={18} color={sup?'var(--sup)':(a.tipo==='entrada'?'var(--green)':'var(--muted)')}/>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,color:'var(--dark)',fontSize:14}}>{p.nombre} {sup && <Badge tone="sup">Supervisor</Badge>}{otro && <Badge tone="blue">{rolLabel(a.persRole)}</Badge>}</div>
            <div style={{fontSize:12,color:'var(--muted)'}}>{centroNom(p.unidadId)} · {p.turno} · {fmtFecha(a.fechaISO)} {fmtHora(a.fechaISO)}</div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:4,alignItems:'flex-end'}}>
            <Badge tone={a.tipo==='entrada'?'green':'gray'}>{a.tipo}</Badge>
            {atras && <Badge tone="red">Atraso</Badge>}
          </div>
        </div>
        {a.maps && <a href={a.maps} target="_blank" style={{display:'inline-block',marginTop:8,fontSize:12.5,color:'var(--primary)',fontWeight:700,textDecoration:'none'}}>abrir ubicación →</a>}
      </Card>;
    })}
  </>;
}

/* ═══════════ Planilla de RONDAS (multi-filtro + color por rol) ═══════════ */
function AdminRondas({db,viewer}){
  const [semOff,setSemOff]=useState(0);
  const [rol,setRol]=useState([]); const [turno,setTurno]=useState([]);
  const [depto,setDepto]=useState([]); const [centro,setCentro]=useState([]);
  const pers=(r)=>personaDe(db,r.persRole,r.persId);
  const centroNom=(id)=>{const u=db.unidades.find(x=>x.id===id);return u?u.nombre:'—';};
  const sem=semanaRango(semOff);
  const regs=db.rondasReg.filter(r=>{const t=new Date(r.fechaISO); return t>=sem.ini && t<=sem.fin;}).map(r=>({r,p:pers(r)})).filter(({r,p})=>{
    if(!p) return false;
    if(rol.length && !rol.includes(r.persRole)) return false;
    if(turno.length && !turno.includes(p.turno)) return false;
    if(depto.length && !depto.includes(p.departamento)) return false;
    if(centro.length && !centro.includes(String(p.unidadId))) return false;
    return true;
  }).sort((x,y)=>new Date(x.r.fechaISO)-new Date(y.r.fechaISO));
  const cols=["Fecha","Persona","Rol","Turno","Depto.","Centro","Punto","Hora","Coordenadas"];
  const filas=()=>regs.map(({r,p})=>[fmtFecha(r.fechaISO), p.nombre, rolLabel(r.persRole), p.turno||'—', p.departamento||'—', centroNom(p.unidadId), r.punto, fmtHora(r.fechaISO), r.coords||'sin GPS']);
  const exportar=()=>exportarPDF(`Rondas · Semana ${sem.label}`, cols, filas());
  const exportarXls=()=>exportarExcel(`rondas_semana_${sem.file}`, cols, filas());
  return <>
    <SectionTitle right={puedeExportar(viewer) && <div style={{display:'flex',gap:6}}>
      <button onClick={exportarXls} style={{background:'var(--green-bg)',color:'var(--green-t)',border:'1px solid #c3ddc9',borderRadius:10,padding:'8px 10px',fontWeight:700,fontSize:13,display:'flex',alignItems:'center',gap:4}}><Icon d={I.dl} size={16} color="var(--green-t)"/> Excel</button>
      <button onClick={exportar} style={{background:'var(--soft)',color:'var(--primary)',border:'1px solid var(--line)',borderRadius:10,padding:'8px 10px',fontWeight:700,fontSize:13,display:'flex',alignItems:'center',gap:4}}><Icon d={I.pdf} size={16} color="var(--primary)"/> PDF</button>
    </div>}>Rondas de control</SectionTitle>
    <SemanaNavFiltros sem={sem} semOff={semOff} setSemOff={setSemOff}>
      <ChipGroup label="Rol" sel={rol} setSel={setRol} opciones={[{v:'guardia',t:'Guardias'},{v:'supervisor',t:'Supervisores'}]}/>
      <ChipGroup label="Turno" sel={turno} setSel={setTurno} opciones={[{v:'Diurno',t:'Diurno'},{v:'Nocturno',t:'Nocturno'}]}/>
      <ChipGroup label="Departamento" sel={depto} setSel={setDepto} opciones={DEPARTAMENTOS.map(d=>({v:d,t:d}))}/>
      <ChipGroup label="Centro" sel={centro} setSel={setCentro} opciones={db.unidades.map(u=>({v:String(u.id),t:u.nombre}))}/>
    </SemanaNavFiltros>
    {regs.length===0 && <Empty>Sin rondas registradas para este filtro.</Empty>}
    {regs.map(({r,p})=>{
      const sup=r.persRole==='supervisor';
      return <Card key={r.id} style={{padding:14,borderLeft:`4px solid ${sup?'var(--sup)':'var(--primary)'}`}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:38,height:38,borderRadius:10,background:sup?'var(--sup-bg)':'var(--soft)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Icon d={I.route} size={18} color={sup?'var(--sup)':'var(--primary)'}/></div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,color:'var(--dark)',fontSize:14}}>{r.punto}</div>
            <div style={{fontSize:12,color:'var(--muted)'}}>{p.nombre} · {centroNom(p.unidadId)} · {fmtFecha(r.fechaISO)} {fmtHora(r.fechaISO)}</div>
          </div>
          {sup?<Badge tone="sup">Supervisor</Badge>:<Badge tone="green">OK</Badge>}
        </div>
        {r.maps && <a href={r.maps} target="_blank" style={{display:'inline-block',marginTop:8,fontSize:12.5,color:'var(--primary)',fontWeight:700,textDecoration:'none'}}>abrir ubicación →</a>}
      </Card>;
    })}
  </>;
}

/* ═══════════════════════════ EXTRAS ═══════════════════════════ */
function AdminExtras({db,setDb,auth,soloSupervisor}){
  const [edit,setEdit]=useState(null);
  const [amb,setAmb]=useState(soloSupervisor?['supervisor']:[]);
  const centroNom=(id)=>{const u=db.unidades.find(x=>x.id===id);return u?u.nombre:'—';};
  const persNom=(ambito,id)=>{const p= ambito==='supervisor'?(db.supervisores||[]).find(x=>x.id===id):db.guardias.find(x=>x.id===id); return p?p.nombre:'—';};
  const lista=(db.extras||[]).filter(x=> soloSupervisor? x.ambito==='supervisor' : (amb.length===0||amb.includes(x.ambito)))
    .sort((a,b)=> (b.fechaISO||'').localeCompare(a.fechaISO||''));

  const guardar=(x)=>{
    setDb(prev=>{
      let nx, msg;
      if(x.id){ nx={...prev,extras:prev.extras.map(e=>e.id===x.id?{...e,...x}:e)}; msg=`editó un turno extra de ${persNom(x.ambito,x.trabajadorId)}`; }
      else { nx={...prev,extras:[...(prev.extras||[]),{...x,id:uid(prev)}]}; msg=`registró turno extra: ${persNom(x.ambito,x.trabajadorId)} cubrió a ${persNom(x.ambito,x.reemplazaId)}`; }
      pushNotif(nx, auth, msg); saveDB(nx); return nx;
    });
    setEdit(null);
  };
  const borrar=(x)=>{ if(!confirm("¿Eliminar este registro de extra?"))return;
    setDb(prev=>{const nx={...prev,extras:prev.extras.filter(e=>e.id!==x.id)}; pushNotif(nx,auth,`eliminó un turno extra`); saveDB(nx);return nx;}); };
  const exportar=()=>{
    exportarPDF("Registro de turnos extra",
      ["Fecha","Ámbito","Trabajó el extra","Reemplazó a","Puesto/Centro","Horario","Compensación","Estado"],
      lista.map(x=>[x.fechaISO, x.ambito==='supervisor'?'Supervisores':'Guardias', persNom(x.ambito,x.trabajadorId), persNom(x.ambito,x.reemplazaId),
        (x.puesto?x.puesto+' · ':'')+centroNom(x.unidadId), x.horario||'—', x.compensacion||'—', x.estadoPago||'—']));
  };

  return <>
    <SectionTitle right={<div style={{display:'flex',gap:8}}>
      {puedeExportar(auth.role) && <button onClick={exportar} style={{background:'var(--soft)',color:'var(--primary)',border:'1px solid var(--line)',borderRadius:10,padding:'8px 10px',fontWeight:700,fontSize:13,display:'flex',alignItems:'center',gap:4}}><Icon d={I.pdf} size={16} color="var(--primary)"/> PDF</button>}
      <button onClick={()=>setEdit('nuevo')} style={{background:'var(--primary)',color:'#fff',border:'none',borderRadius:10,padding:'8px 12px',fontWeight:700,fontSize:13,display:'flex',alignItems:'center',gap:5}}><Icon d={I.plus} size={16} color="#fff"/> Extra</button>
    </div>}>Turnos extra</SectionTitle>
    <div style={{fontSize:12,color:'var(--muted)',margin:'-6px 2px 12px'}}>Registro de horas extra: quién las cubrió, a quién reemplazó, y si se paga o se compensa con permiso (para fijos). Sirve para descontar al ausente y pagar al extra.</div>
    {!soloSupervisor && <ChipGroup label="Ámbito" sel={amb} setSel={setAmb} opciones={[{v:'guardia',t:'Guardias'},{v:'supervisor',t:'Supervisores'}]}/>}
    {lista.length===0 && <Empty>Sin turnos extra registrados.</Empty>}
    {lista.map(x=><Card key={x.id} style={{borderLeft:`4px solid ${x.ambito==='supervisor'?'var(--sup)':'var(--primary)'}`}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
        <Icon d={I.swap} size={20} color={x.ambito==='supervisor'?'var(--sup)':'var(--primary)'}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:800,color:'var(--dark)',fontSize:14.5}}>{persNom(x.ambito,x.trabajadorId)}</div>
          <div style={{fontSize:12,color:'var(--muted)'}}>cubrió a <b>{persNom(x.ambito,x.reemplazaId)}</b></div>
        </div>
        <Badge tone={x.ambito==='supervisor'?'sup':'blue'}>{x.ambito==='supervisor'?'Superv.':'Guardia'}</Badge>
      </div>
      <div style={{fontSize:12.5,color:'var(--body)',lineHeight:1.7,borderTop:'1px solid var(--line)',paddingTop:8}}>
        <div><b>Fecha:</b> {x.fechaISO} · <b>Horario:</b> {x.horario||'—'}</div>
        <div><b>Puesto:</b> {(x.puesto?x.puesto+' · ':'')}{centroNom(x.unidadId)}</div>
        <div><b>Compensación:</b> {x.compensacion||'—'} {x.compensacion==='Pago' && x.estadoPago?`(${x.estadoPago})`:''}{x.monto?` · Bs ${x.monto}`:''}</div>
        {x.obs && <div><b>Obs:</b> {x.obs}</div>}
      </div>
      <div style={{display:'flex',gap:8,marginTop:12}}>
        <button onClick={()=>setEdit(x)} style={btnGhost}><Icon d={I.edit} size={15}/> Editar</button>
        <button onClick={()=>borrar(x)} style={{...btnGhost,flex:'0 0 44px',color:'var(--red)'}}><Icon d={I.trash} size={16}/></button>
      </div>
    </Card>)}
    {edit && <ExtraForm db={db} extra={edit==='nuevo'?null:edit} soloSupervisor={soloSupervisor} onSave={guardar} onClose={()=>setEdit(null)}/>}
  </>;
}
function ExtraForm({db,extra,soloSupervisor,onSave,onClose}){
  const [f,setF]=useState(extra||{ambito:soloSupervisor?'supervisor':'guardia',trabajadorId:'',reemplazaId:'',
    unidadId:db.unidades[0]?.id||1,puesto:'',horario:'',fechaISO:hoyISO(),compensacion:'Pago',estadoPago:'Pendiente',monto:'',obs:''});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const gente = f.ambito==='supervisor'? (db.supervisores||[]) : db.guardias;
  const submit=()=>{
    if(!f.trabajadorId){ alert("Seleccione quién hizo el extra."); return; }
    if(!f.reemplazaId){ alert("Seleccione a quién reemplazó."); return; }
    onSave({...f, trabajadorId:Number(f.trabajadorId), reemplazaId:Number(f.reemplazaId), unidadId:Number(f.unidadId)});
  };
  return <Modal title={extra?"Editar turno extra":"Nuevo turno extra"} onClose={onClose}>
    {!soloSupervisor && <Field label="Ámbito">
      <select style={inputStyle} value={f.ambito} onChange={e=>{set('ambito',e.target.value);set('trabajadorId','');set('reemplazaId','');}}>
        <option value="guardia">Guardias</option><option value="supervisor">Supervisores</option>
      </select>
    </Field>}
    <Field label="¿Quién trabajó el extra? *">
      <select style={inputStyle} value={f.trabajadorId} onChange={e=>set('trabajadorId',e.target.value)}>
        <option value="">— Seleccione —</option>
        {gente.filter(p=>p.estado==='Activo').map(p=><option key={p.id} value={p.id}>{p.nombre} ({p.cuenta}){p.tipo?` · ${p.tipo}`:''}</option>)}
      </select>
    </Field>
    <Field label="¿A quién reemplazó? (se le descuenta) *">
      <select style={inputStyle} value={f.reemplazaId} onChange={e=>set('reemplazaId',e.target.value)}>
        <option value="">— Seleccione —</option>
        {gente.map(p=><option key={p.id} value={p.id}>{p.nombre} ({p.cuenta})</option>)}
      </select>
    </Field>
    <Field label="Puesto / cargo cubierto"><input style={inputStyle} value={f.puesto} onChange={e=>set('puesto',e.target.value)} placeholder="Ej: Puerta principal"/></Field>
    <Field label="Centro / Unidad">
      <select style={inputStyle} value={f.unidadId} onChange={e=>set('unidadId',e.target.value)}>
        {db.unidades.map(u=><option key={u.id} value={u.id}>{u.nombre}</option>)}
      </select>
    </Field>
    <div style={{display:'flex',gap:8}}>
      <div style={{flex:1}}><Field label="Fecha"><input type="date" style={inputStyle} value={f.fechaISO} onChange={e=>set('fechaISO',e.target.value)}/></Field></div>
      <div style={{flex:1}}><Field label="Horario"><input style={inputStyle} value={f.horario} onChange={e=>set('horario',e.target.value)} placeholder="07:00 - 15:00"/></Field></div>
    </div>
    <Field label="Compensación al trabajador">
      <select style={inputStyle} value={f.compensacion} onChange={e=>set('compensacion',e.target.value)}>
        <option value="Pago">Pago del extra</option>
        <option value="Permiso">Permiso otro día (para fijos)</option>
      </select>
    </Field>
    {f.compensacion==='Pago' && <div style={{display:'flex',gap:8}}>
      <div style={{flex:1}}><Field label="Estado del pago">
        <select style={inputStyle} value={f.estadoPago} onChange={e=>set('estadoPago',e.target.value)}>
          <option>Pendiente</option><option>Pagado</option>
        </select></Field></div>
      <div style={{flex:1}}><Field label="Monto (Bs, opcional)"><input style={inputStyle} value={f.monto} onChange={e=>set('monto',e.target.value)} inputMode="decimal"/></Field></div>
    </div>}
    <Field label="Observaciones"><textarea style={{...inputStyle,minHeight:54,resize:'vertical'}} value={f.obs} onChange={e=>set('obs',e.target.value)}/></Field>
    <button onClick={submit} style={{width:'100%',padding:'13px',background:'var(--primary)',color:'#fff',border:'none',borderRadius:11,fontWeight:700,fontSize:15}}>Guardar</button>
  </Modal>;
}

/* ═══════════════════════════ INFRACCIONES (emisor) ═══════════════════════════ */
function AdminInfracciones({db,setDb,auth}){
  const [edit,setEdit]=useState(null);
  const [q,setQ]=useState("");
  const dNom=(x)=>{const p=personaDe(db,x.destRole,x.destId);return p?p.nombre:'—';};
  const dCuenta=(x)=>{const p=personaDe(db,x.destRole,x.destId);return p?p.cuenta:'—';};
  const lista=(db.infracciones||[]).filter(x=> (dNom(x)+' '+x.concepto).toLowerCase().includes(q.toLowerCase()))
    .sort((a,b)=>new Date(b.createdISO)-new Date(a.createdISO));

  const notificarCorreo=(x)=>{
    const p=personaDe(db,x.destRole,x.destId);
    const su=`Infracción / comunicado — ${p?p.nombre:''} (${p?p.cuenta:''})`;
    const body=`Destinatario: ${p?p.nombre:''} (${p?p.cuenta:''}) · ${rolLabel(x.destRole)}\nConcepto: ${x.concepto}\nInforme: ${x.detalle}\nFecha del hecho: ${x.fechaEvento} ${x.horaEvento||''}\n\nEmitido por: ${x.emisorNombre} (${rolLabel(x.emisorRole)} · ${x.emisorCuenta})\nRegistrado: ${fmtFH(x.createdISO)}`;
    const dest = db.notifyEmail || (p&&p.correo) || "";
    if(!dest){ alert("No hay correo asignado. El administrador debe configurarlo en Ajustes."); return; }
    window.open(gmailLink(dest, su, body), '_blank');
  };

  const guardar=(x)=>{
    let creada=null;
    setDb(prev=>{
      const nueva={...x, id:uid(prev), emisorRole:auth.role, emisorCuenta:auth.usuario, emisorNombre:auth.nombre, createdISO:new Date().toISOString()};
      creada=nueva;
      const nx={...prev, infracciones:[...(prev.infracciones||[]), nueva]};
      pushNotif(nx, auth, `emitió una infracción a ${personaDe(nx,x.destRole,x.destId)?.nombre||'—'}: ${x.concepto}`);
      saveDB(nx); return nx;
    });
    setEdit(null);
    setTimeout(()=>{ if(creada) notificarCorreo(creada); },120);
  };
  const borrar=(x)=>{ if(!confirm("¿Eliminar esta infracción?"))return;
    setDb(prev=>{const nx={...prev,infracciones:prev.infracciones.filter(i=>i.id!==x.id)}; pushNotif(nx,auth,`eliminó una infracción de ${dNom(x)}`); saveDB(nx);return nx;}); };

  return <>
    <SectionTitle right={<button onClick={()=>setEdit('nuevo')} style={{background:'var(--primary)',color:'#fff',border:'none',borderRadius:10,padding:'8px 12px',fontWeight:700,fontSize:13,display:'flex',alignItems:'center',gap:5}}><Icon d={I.plus} size={16} color="#fff"/> Nueva</button>}>Infracciones y comunicados</SectionTitle>
    <div style={{fontSize:12,color:'var(--muted)',margin:'-6px 2px 12px'}}>Comunicados dirigidos a cada guardia o administrativo. Solo el destinatario ve las suyas. Al registrar se abre el correo de notificación al correo asignado.</div>
    {!db.notifyEmail && <Card style={{background:'var(--amber-bg)',border:'1px solid #e4d3a6',color:'var(--amber-t)',fontSize:12.5,fontWeight:600}}>⚠ No hay correo de notificación configurado. Pídale al administrador que lo defina en Ajustes para que las notificaciones se envíen al correo asignado.</Card>}
    <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar por persona o concepto…" style={{...inputStyle,marginBottom:12}}/>
    {lista.length===0 && <Empty>Sin infracciones registradas.</Empty>}
    {lista.map(x=><Card key={x.id} style={{borderLeft:'4px solid var(--red)'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
        <Icon d={I.alert} size={20} color="var(--red)"/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:800,color:'var(--dark)'}}>{x.concepto}</div>
          <div style={{fontSize:12,color:'var(--muted)'}}>{dNom(x)} · {dCuenta(x)} · {rolLabel(x.destRole)}</div>
        </div>
      </div>
      <div style={{fontSize:13,color:'var(--body)',lineHeight:1.5,marginBottom:8,whiteSpace:'pre-wrap'}}>{x.detalle}</div>
      <div style={{fontSize:11.5,color:'var(--muted)',lineHeight:1.6,borderTop:'1px solid var(--line)',paddingTop:8}}>
        <div><b>Hecho:</b> {x.fechaEvento} {x.horaEvento||''} · <b>Emitió:</b> {x.emisorNombre} ({rolLabel(x.emisorRole)} · {x.emisorCuenta})</div>
        <div><b>Registrado:</b> {fmtFH(x.createdISO)}</div>
      </div>
      <div style={{display:'flex',gap:8,marginTop:12}}>
        <button onClick={()=>notificarCorreo(x)} style={{...btnGhost,color:'var(--primary)'}}><Icon d={I.mail} size={15} color="var(--primary)"/> Notificar por correo</button>
        <button onClick={()=>borrar(x)} style={{...btnGhost,flex:'0 0 44px',color:'var(--red)'}}><Icon d={I.trash} size={16}/></button>
      </div>
    </Card>)}
    {edit && <InfraccionForm db={db} onSave={guardar} onClose={()=>setEdit(null)}/>}
  </>;
}
function InfraccionForm({db,onSave,onClose}){
  const [f,setF]=useState({destRole:'guardia',destId:'',concepto:'',detalle:'',fechaEvento:hoyISO(),horaEvento:new Date().toTimeString().slice(0,5)});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const gente = f.destRole==='administrativo' ? (db.administrativos||[]) : db.guardias;
  const submit=()=>{
    if(!f.destId){ alert("Seleccione al destinatario."); return; }
    if(!f.concepto.trim()){ alert("Ingrese el concepto."); return; }
    if(!f.detalle.trim()){ alert("Ingrese el informe/detalle."); return; }
    onSave({...f, destId:Number(f.destId)});
  };
  return <Modal title="Nueva infracción / comunicado" onClose={onClose}>
    <Field label="Tipo de destinatario *">
      <select style={inputStyle} value={f.destRole} onChange={e=>{set('destRole',e.target.value);set('destId','');}}>
        <option value="guardia">Guardia</option>
        <option value="administrativo">Administrativo</option>
      </select>
    </Field>
    <Field label="Destinatario *">
      <select style={inputStyle} value={f.destId} onChange={e=>set('destId',e.target.value)}>
        <option value="">— Seleccione —</option>
        {gente.map(g=><option key={g.id} value={g.id}>{g.nombre} ({g.cuenta})</option>)}
      </select>
    </Field>
    <Field label="Concepto *"><input style={inputStyle} value={f.concepto} onChange={e=>set('concepto',e.target.value)} placeholder="Ej: Atraso reiterado / Abandono de puesto"/></Field>
    <Field label="Informe *"><textarea style={{...inputStyle,minHeight:90,resize:'vertical'}} value={f.detalle} onChange={e=>set('detalle',e.target.value)} placeholder="Describa lo ocurrido…"/></Field>
    <div style={{display:'flex',gap:8}}>
      <div style={{flex:1}}><Field label="Día del hecho"><input type="date" style={inputStyle} value={f.fechaEvento} onChange={e=>set('fechaEvento',e.target.value)}/></Field></div>
      <div style={{flex:1}}><Field label="Hora del hecho"><input type="time" style={inputStyle} value={f.horaEvento} onChange={e=>set('horaEvento',e.target.value)}/></Field></div>

/* ═══════════════════════════ INICIO / DASHBOARD ═══════════════════════════ */
function Dashboard({db,auth,showActividad}){
  const hoy=hoyISO(); const mes=mesActual();
  const activos=db.guardias.filter(g=>g.estado==='Activo').length;
  const unidades=db.unidades.length;
  const asHoy=db.asistencia.filter(a=>a.fechaISO.slice(0,10)===hoy);
  const ingresos=asHoy.filter(a=>a.tipo==='entrada').length;
  const salidas=asHoy.filter(a=>a.tipo==='salida').length;
  const atrasos=asHoy.filter(a=>a.tipo==='entrada' && esAtraso(a, personaDe(db,a.persRole,a.persId))).length;
  const altas=db.guardias.filter(g=>(g.ingreso||'').slice(0,7)===mes).length;
  const bajas=db.guardias.filter(g=>(g.fin||'').slice(0,7)===mes).length;

  const enviarResumen=()=>{
    if(!db.notifyEmail){ alert("Configure el correo de notificación en Ajustes."); return; }
    const su=`Resumen de actividad · ${fmtFecha(hoy+'T00:00')}`;
    const lines=(db.notifs||[]).slice(0,25).map(n=>`• ${fmtFH(n.fechaISO)} — ${n.actorNombre} (${rolLabel(n.actorRole)} · ${n.actorCuenta}) ${n.texto}`).join('\n');
    const body=`Guardias activos: ${activos}\nUnidades: ${unidades}\nHoy — Ingresos: ${ingresos} · Salidas: ${salidas} · Atrasos: ${atrasos}\nMes — Altas: ${altas} · Bajas: ${bajas}\n\nActividad reciente:\n${lines||'—'}`;
    window.open(gmailLink(db.notifyEmail, su, body), '_blank');
  };

  return <>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
      <Card style={{marginBottom:0,padding:16}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}><Icon d={I.user} size={18} color="var(--primary)"/><span style={{fontSize:12.5,color:'var(--muted)',fontWeight:700}}>Guardias activos</span></div>
        <div style={{fontSize:30,fontWeight:800,color:'var(--dark)'}}>{activos}</div>
      </Card>
      <Card style={{marginBottom:0,padding:16}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}><Icon d={I.map} size={18} color="var(--primary)"/><span style={{fontSize:12.5,color:'var(--muted)',fontWeight:700}}>Unidades</span></div>
        <div style={{fontSize:30,fontWeight:800,color:'var(--dark)'}}>{unidades}</div>
      </Card>
    </div>

    <Card>
      <div style={{fontWeight:800,color:'var(--dark)',marginBottom:12}}>Actividad de hoy</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,textAlign:'center'}}>
        <div style={{background:'var(--green-bg)',borderRadius:12,padding:'12px 6px'}}>
          <div style={{fontSize:24,fontWeight:800,color:'var(--green-t)'}}>{ingresos}</div>
          <div style={{fontSize:11.5,color:'var(--green-t)',fontWeight:700}}>Ingresos</div>
        </div>
        <div style={{background:'var(--soft2)',borderRadius:12,padding:'12px 6px'}}>
          <div style={{fontSize:24,fontWeight:800,color:'var(--primary)'}}>{salidas}</div>
          <div style={{fontSize:11.5,color:'var(--primary)',fontWeight:700}}>Salidas</div>
        </div>
        <div style={{background:'var(--red-bg)',borderRadius:12,padding:'12px 6px'}}>
          <div style={{fontSize:24,fontWeight:800,color:'var(--red-t)'}}>{atrasos}</div>
          <div style={{fontSize:11.5,color:'var(--red-t)',fontWeight:700}}>Atrasos</div>
        </div>
      </div>
    </Card>

    <Card>
      <div style={{fontWeight:800,color:'var(--dark)',marginBottom:4}}>Movimiento del mes</div>
      <div style={{fontSize:11.5,color:'var(--muted)',marginBottom:12}}>Según inicio y fin de contrato en la información de cada guardia.</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,textAlign:'center'}}>
        <div style={{background:'var(--green-bg)',borderRadius:12,padding:'14px 6px'}}>
          <div style={{fontSize:26,fontWeight:800,color:'var(--green-t)'}}>{altas}</div>
          <div style={{fontSize:12,color:'var(--green-t)',fontWeight:700}}>Altas (inician)</div>
        </div>
        <div style={{background:'var(--red-bg)',borderRadius:12,padding:'14px 6px'}}>
          <div style={{fontSize:26,fontWeight:800,color:'var(--red-t)'}}>{bajas}</div>
          <div style={{fontSize:12,color:'var(--red-t)',fontWeight:700}}>Bajas (dejan)</div>
        </div>
      </div>
    </Card>

    {showActividad && <Card>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}><Icon d={I.bell} size={18} color="var(--primary)"/><span style={{fontWeight:800,color:'var(--dark)'}}>Actividad reciente</span></div>
        <button onClick={enviarResumen} style={{background:'var(--soft)',color:'var(--primary)',border:'1px solid var(--line)',borderRadius:9,padding:'6px 10px',fontWeight:700,fontSize:12,display:'flex',alignItems:'center',gap:5}}><Icon d={I.mail} size={14} color="var(--primary)"/> Enviar por correo</button>
      </div>
      {(db.notifs||[]).length===0 && <div style={{fontSize:13,color:'var(--muted)'}}>Sin actividad registrada aún.</div>}
      {(db.notifs||[]).slice(0,12).map(n=><div key={n.id} style={{padding:'8px 0',borderBottom:'1px solid var(--line)',fontSize:12.5}}>
        <div style={{color:'var(--dark)'}}><b>{n.actorNombre}</b> <span style={{color:'var(--muted)'}}>({rolLabel(n.actorRole)} · {n.actorCuenta})</span> {n.texto}</div>
        <div style={{color:'var(--muted)',fontSize:11,marginTop:1}}>{fmtFH(n.fechaISO)}</div>

  </>;

/* ═══════════════════════════ AJUSTES (solo admin) ═══════════════════════════ */
function BackupPanel({db,setDb,auth}){
  const [msg,setMsg]=useState(null);
  const descargar=()=>{
    const blob=new Blob([JSON.stringify(db,null,2)], {type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download=`respaldo-sefiess-${hoyISO()}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  };
  const restaurar=(e)=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=()=>{
      try{
        const data=JSON.parse(reader.result);
        if(!confirm("¿Reemplazar TODA la información actual por la de este archivo de respaldo? Esta acción no se puede deshacer.")) return;
        const nx={...seed(), ...data};
        pushNotif(nx, auth, "restauró un respaldo desde un archivo");
        saveDB(nx);
        setDb(nx);
        setMsg("Respaldo restaurado correctamente.");
        setTimeout(()=>setMsg(null),3000);
      }catch(err){ alert("El archivo no es un respaldo válido (debe ser el .json descargado desde aquí)."); }
    };
    reader.readAsText(file);
    e.target.value="";
  };
  return <Card>
    <div style={{fontWeight:800,color:"var(--dark)",marginBottom:6}}>Respaldo de información</div>
    <div style={{fontSize:12,color:"var(--muted)",marginBottom:12,lineHeight:1.5}}>
      Descarga una copia completa de todos los datos (guardias, asistencia, rondas, infracciones, etc.) en un archivo .json.
      Guárdalo en tu correo, Google Drive o donde prefieras, aparte de la nube de Firebase. Se recomienda hacerlo cada cierto tiempo.
    </div>
    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
      <button onClick={descargar} style={{background:"var(--primary)",color:"#fff",border:"none",borderRadius:10,padding:"10px 14px",fontWeight:700,fontSize:13.5,display:"flex",alignItems:"center",gap:6}}>
        <Icon d={I.download} size={16} color="#fff"/> Descargar respaldo
      </button>
      <label style={{background:"var(--soft)",color:"var(--primary)",border:"1px solid var(--line)",borderRadius:10,padding:"10px 14px",fontWeight:700,fontSize:13.5,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
        <Icon d={I.upload} size={16} color="var(--primary)"/> Restaurar desde archivo
        <input type="file" accept="application/json" onChange={restaurar} style={{display:"none"}}/>
      </label>
    </div>
    {msg && <div style={{marginTop:10,fontSize:12.5,color:"var(--green-t)",fontWeight:700}}>{msg}</div>}
  </Card>;
}

function CambioPassAdmin({db,setDb,auth}){
  const [actual,setActual]=useState(""); const [nueva,setNueva]=useState(""); const [conf,setConf]=useState(""); const [msg,setMsg]=useState(null);
  const cambiar=()=>{
    setMsg(null);
    const adm=db.admins[auth.usuario];
    if(!adm || sha256(actual)!==adm.passHash){ setMsg({t:'err',m:"La contraseña actual es incorrecta."}); return; }
    if(nueva.length<4){ setMsg({t:'err',m:"Debe tener al menos 4 caracteres."}); return; }
    if(nueva!==conf){ setMsg({t:'err',m:"Las contraseñas no coinciden."}); return; }
    setDb(prev=>{const nx={...prev, admins:{...prev.admins,[auth.usuario]:{...prev.admins[auth.usuario],passHash:sha256(nueva)}}};saveDB(nx);return nx;});
    setActual("");setNueva("");setConf(""); setMsg({t:'ok',m:"Contraseña de administrador actualizada."});
  };
  return <Card>
    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}><Icon d={I.lock} size={20} color="var(--primary)"/><div style={{fontWeight:800,color:'var(--dark)'}}>Contraseña de administrador</div></div>
    <div style={{fontSize:12.5,color:'var(--muted)',marginBottom:14}}>Usuario: <b>{auth.usuario}</b></div>
    <Field label="Contraseña actual"><PassInput value={actual} onChange={e=>setActual(e.target.value)}/></Field>
    <Field label="Nueva contraseña"><PassInput value={nueva} onChange={e=>setNueva(e.target.value)}/></Field>
    <Field label="Confirmar nueva contraseña"><PassInput value={conf} onChange={e=>setConf(e.target.value)}/></Field>
    {msg && <div style={{background:msg.t==='ok'?'var(--green-bg)':'var(--red-bg)',color:msg.t==='ok'?'var(--green-t)':'var(--red-t)',fontSize:13,fontWeight:600,padding:'9px 12px',borderRadius:9,marginBottom:12}}>{msg.m}</div>}
    <button onClick={cambiar} style={{width:'100%',padding:'12px',background:'var(--primary)',color:'#fff',border:'none',borderRadius:11,fontWeight:700,fontSize:15}}>Actualizar</button>
  </Card>;
}
function CambioPassSimple({titulo,desc,icon,onSave}){
  const [nueva,setNueva]=useState(""); const [conf,setConf]=useState(""); const [msg,setMsg]=useState(null);
  const cambiar=()=>{
    setMsg(null);
    if(nueva.length<4){ setMsg({t:'err',m:"Debe tener al menos 4 caracteres."}); return; }
    if(nueva!==conf){ setMsg({t:'err',m:"Las contraseñas no coinciden."}); return; }
    onSave(sha256(nueva));
    setNueva("");setConf(""); setMsg({t:'ok',m:"Contraseña actualizada."});
  };
  return <Card>
    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}><Icon d={icon} size={20} color="var(--primary)"/><div style={{fontWeight:800,color:'var(--dark)'}}>{titulo}</div></div>

    <Field label="Confirmar nueva contraseña"><PassInput value={conf} onChange={e=>setConf(e.target.value)}/></Field>
    {msg && <div style={{background:msg.t==='ok'?'var(--green-bg)':'var(--red-bg)',color:msg.t==='ok'?'var(--green-t)':'var(--red-t)',fontSize:13,fontWeight:600,padding:'9px 12px',borderRadius:9,marginBottom:12}}>{msg.m}</div>}
    <button onClick={cambiar} style={{width:'100%',padding:'12px',background:'var(--primary)',color:'#fff',border:'none',borderRadius:11,fontWeight:700,fontSize:15}}>Actualizar</button>
  </Card>;
}
