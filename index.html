    {id:"extras",label:"Extras",icon:I.swap},
  ];
  return <Shell title={s.nombre} subtitle={`Supervisor · ${s.cuenta}`} onLogout={onLogout} tabs={tabs} active={tab} setActive={setTab}>
    {tab==="micontrol" && <MiControl db={db} setDb={setDb} auth={auth} persona={s}/>}
    {tab==="planillas" && <PlanillasPanel db={db} viewer="supervisor"/>}
    {tab==="infracciones" && <AdminInfracciones db={db} setDb={setDb} auth={auth}/>}
    {tab==="unidades" && <AdminUnidades db={db} readOnly={true}/>}
    {tab==="extras" && <AdminExtras db={db} setDb={setDb} auth={auth} soloSupervisor={true}/>}
  </Shell>;
}

/* ═══════════════════════════ RAÍZ ═══════════════════════════ */
function App(){
  const [db,setDb]=useState(loadDB);
  const [sync,setSync]=useState(fireCore?"conectando":"local");

  // Escucha cambios en tiempo real de Firestore (lo que hagan otros celulares llega aquí solo)
  useEffect(()=>{
    if(!fireCore) return;
    let unsubs=[]; let migrado=false;
    const empezarEscucha=()=>{
      if(unsubs.length) return;
      // 1) documento núcleo: guardias, supervisores, unidades, contraseñas, notificaciones, etc.
      unsubs.push(fireCore.onSnapshot(snap=>{
        if(snap.exists){
          const remoto=snap.data();
          // Migración de una sola vez: si el documento todavía trae guardado el formato viejo
          // (arreglos grandes embebidos), los copia a sus colecciones nuevas y limpia el documento.
          if(!migrado && LEGACY_KEYS.some(k=>Array.isArray(remoto[k]) && remoto[k].length)){
            migrado=true;
            LEGACY_KEYS.forEach(k=>{
              const col=fireCols[k];
              (remoto[k]||[]).forEach(item=>{ if(item && item.id!=null) col.doc(String(item.id)).set(item).catch(()=>{}); });
            });
            fireCore.set(nucleoDeEstado(remoto)).catch(()=>{});
          }
          setDb(prev=>{
            const fusion={...seed(), ...prev, ...nucleoDeEstado(remoto)};
            try{localStorage.setItem(DB_KEY,JSON.stringify(fusion));}catch(e){}
            return fusion;
          });
          if(_ultimoSync) _ultimoSync={..._ultimoSync, ...nucleoDeEstado(remoto)};
          setSync("sincronizado");
        }else{
          // primera vez: sube lo que ya hay localmente para crear el documento en la nube
          fireCore.set(nucleoDeEstado(db)).catch(()=>{});
          LEGACY_KEYS.forEach(k=>{
            const col=fireCols[k];
            (db[k]||[]).forEach(item=>{ if(item && item.id!=null) col.doc(String(item.id)).set(item).catch(()=>{}); });
          });
        }
      }, ()=>setSync("sin conexión")));
      // 2) las 4 colecciones que crecen sin límite: cada una llega como su propio arreglo
      LEGACY_KEYS.forEach(k=>{
        unsubs.push(fireCols[k].onSnapshot(snap=>{
          const arr=snap.docs.map(x=>x.data());
          setDb(prev=>{
            const fusion={...prev,[k]:arr};
            try{localStorage.setItem(DB_KEY,JSON.stringify(fusion));}catch(e){}
            return fusion;
          });
          if(_ultimoSync) _ultimoSync={..._ultimoSync,[k]:arr};
        }, ()=>setSync("sin conexión")));
      });
    };
    // Solo empieza a escuchar Firestore una vez que la sesión anónima quedó lista (así no choca con las Reglas de seguridad)
    const unsubAuth=firebase.auth().onAuthStateChanged(user=>{ if(user) empezarEscucha(); });
    return ()=>{ unsubAuth(); unsubs.forEach(u=>u()); };
  },[]);
  // La sesión vive en sessionStorage: se borra al cerrar la pestaña. Además caduca a las SESSION_HORAS.
  const [auth,setAuth]=useState(()=>{
    try{
      const s=sessionStorage.getItem(SESSION_KEY);
      if(!s) return null;
      const a=JSON.parse(s);
      if(!a._ts || (Date.now()-a._ts) >= SESSION_HORAS*3600*1000) return null;
      return a;
    }catch{ return null; }
  });
  const iniciarSesion=(a)=> setAuth({...a, _ts:Date.now()});
  const logout=()=>setAuth(null);

  useEffect(()=>{
    if(!auth){ try{ sessionStorage.removeItem(SESSION_KEY); }catch{}; return; }
    try{ sessionStorage.setItem(SESSION_KEY, JSON.stringify(auth)); }catch{}
    const restante = auth._ts + SESSION_HORAS*3600*1000 - Date.now();
    if(restante<=0){ setAuth(null); return; }
    const t=setTimeout(()=>{ alert("Su sesión de "+SESSION_HORAS+" horas ha expirado. Inicie sesión nuevamente."); setAuth(null); }, restante);
    return ()=>clearTimeout(t);
  },[auth]);

  let contenido;
  if(!auth) contenido=<Login db={db} onLogin={iniciarSesion}/>;
  else if(auth.role==='guardia'){
    const g=db.guardias.find(x=>x.id===auth.persId);
    contenido = !g ? <Login db={db} onLogin={iniciarSesion}/> : <GuardiaApp db={db} setDb={setDb} auth={auth} onLogout={logout}/>;
  }
  else if(auth.role==='supervisor'){
    const s=(db.supervisores||[]).find(x=>x.id===auth.persId);
    contenido = !s ? <Login db={db} onLogin={iniciarSesion}/> : <SupervisorApp db={db} setDb={setDb} auth={auth} onLogout={logout}/>;
  }
  else if(auth.role==='administrativo'){
    const a=(db.administrativos||[]).find(x=>x.id===auth.persId);
    contenido = !a ? <Login db={db} onLogin={iniciarSesion}/> : <AdministrativoApp db={db} setDb={setDb} auth={auth} onLogout={logout}/>;
  }
  else if(auth.role==='rrhh') contenido=<GestionApp db={db} setDb={setDb} auth={auth} onLogout={logout} titulo="Recursos Humanos"/>;
  else if(auth.role==='operaciones') contenido=<GestionApp db={db} setDb={setDb} auth={auth} onLogout={logout} titulo="Operaciones"/>;
  else contenido=<AdminApp db={db} setDb={setDb} auth={auth} onLogout={logout}/>;

  return <>
    {fireCore && <div style={{position:'fixed',top:6,right:8,zIndex:9999,fontSize:10.5,fontWeight:700,padding:'3px 8px',borderRadius:20,
      background: sync==='sincronizado' ? 'var(--green-bg)' : sync==='sin conexión' ? 'var(--red-bg)' : 'var(--amber-bg)',
      color: sync==='sincronizado' ? 'var(--green-t)' : sync==='sin conexión' ? 'var(--red-t)' : 'var(--amber-t)'}}>
      {sync==='sincronizado' ? '● En línea' : sync==='sin conexión' ? '● Sin conexión' : '● Conectando…'}
    </div>}
    {contenido}
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
